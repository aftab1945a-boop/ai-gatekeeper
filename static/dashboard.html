<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Gatekeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 p-4 border-b border-gray-700">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">🤖 AI Gatekeeper</h1>
            <a href="/" class="text-gray-300 hover:text-white">← Back to Home</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <h2 class="text-3xl font-bold mb-6">Developer Dashboard</h2>
        
        <!-- API Key Generation Section -->
        <div class="bg-gray-800 rounded-xl p-6 mb-8 border border-gray-700">
            <h3 class="text-xl font-bold mb-4">Generate API Key</h3>
            <div class="flex gap-4">
                <input type="text" id="keyName" placeholder="Enter key name (e.g., My App)" 
                    class="flex-1 px-4 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="generateKey()" class="px-6 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 font-bold">Generate</button>
            </div>
            <div id="keyResult" class="mt-4 hidden p-4 bg-green-900/30 border border-green-600 rounded-lg text-green-400">
                <!-- Key will appear here -->
            </div>
        </div>

        <!-- Stats Section -->
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <div class="text-gray-400 text-sm">Server Status</div>
                <div class="text-2xl font-bold text-green-400 mt-2">🟢 Online</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <div class="text-gray-400 text-sm">Active Endpoint</div>
                <div class="text-lg font-bold mt-2 text-blue-400">/v1/chat/completions</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <div class="text-gray-400 text-sm">Routing Logic</div>
                <div class="text-lg font-bold mt-2 text-purple-400">Intent-Based</div>
            </div>
        </div>
    </div>

    <script>
        async function generateKey() {
            const name = document.getElementById('keyName').value || 'Default Key';
            const resultDiv = document.getElementById('keyResult');
            resultDiv.innerHTML = 'Generating...';
            resultDiv.classList.remove('hidden');

            try {
                // Note: Real app mein yeh authenticated user_id ke saath hoga
                const response = await fetch('/api-keys/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key_name: name, user_id: 1}) 
                });
                const data = await response.json();
                
                if(data.api_key) {
                    resultDiv.innerHTML = `
                        <p class="font-bold mb-2">✅ Key Generated Successfully!</p>
                        <code class="block bg-gray-900 p-3 rounded text-sm select-all">${data.api_key}</p>
                        <p class="text-xs mt-2 text-yellow-400">⚠️ Save this key now! It will not be shown again.</p>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="text-red-400">Error: ${data.detail}</p>`;
                }
            } catch(err) {
                resultDiv.innerHTML = `<p class="text-red-400">Network Error</p>`;
            }
        }
    </script>
</body>
</html>
